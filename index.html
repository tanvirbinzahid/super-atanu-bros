
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Super Atanu Bros – ENG Class Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:#0a0a1a;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Nunito',sans-serif;
  overflow:hidden;
  touch-action:none;
}
#wrap{
  position:relative;
  display:inline-block;
  transform-origin:top center;
}
#hud{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;padding:5px 10px;
  background:rgba(0,0,0,0.85);
  border-bottom:2px solid #ffd700;
  font-family:'Press Start 2P',monospace;
  font-size:clamp(0.38rem,1vw,0.55rem);
  color:#ffd700;
  gap:4px;
}
#hud span{ white-space:nowrap; }
canvas{display:block;image-rendering:pixelated;}
/* Mobile controls */
#mobileControls{
  display:none;
  position:fixed;
  bottom:0;left:0;right:0;
  height:140px;
  pointer-events:none;
  z-index:100;
}
.mBtn{
  position:absolute;
  pointer-events:all;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.45);
  background:rgba(0,0,0,0.32);
  backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;color:#fff;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;user-select:none;cursor:pointer;
}
.mBtn.pressed{background:rgba(255,215,0,0.38);border-color:#ffd700;}
#btnLeft{width:62px;height:62px;left:16px;bottom:56px;}
#btnRight{width:62px;height:62px;left:88px;bottom:56px;}
#btnJump{
  width:76px;height:76px;right:20px;bottom:46px;
  background:rgba(220,50,50,0.3);
  border-color:rgba(255,100,100,0.65);
  font-size:1.1rem;flex-direction:column;gap:0;
  line-height:1.1;
}
@media (pointer:coarse){#mobileControls{display:block;}}
@media (max-width:820px){#mobileControls{display:block;}}
#controls{color:#555;font-size:0.65rem;margin-top:5px;text-align:center;}

/* Force landscape on portrait mobile */
@media (pointer:coarse) and (max-aspect-ratio:1/1){
  html{
    transform:rotate(-90deg);
    transform-origin:left top;
    width:100vh;
    height:100vw;
    overflow:hidden;
    position:absolute;
    top:100%;
    left:0;
  }
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span id="hudCourse">📝 ENG — Prof. Atanu</span>
    <span id="hudScore">SCORE: 0</span>
    <span id="hudGrade">GRADE: F</span>
    <span id="hudLives">♥♥♥</span>
    <span id="hudCoins">📖 0</span>
  </div>
  <canvas id="c" width="800" height="440"></canvas>
</div>
<div id="mobileControls">
    <div class="mBtn" id="btnLeft">◀</div>
    <div class="mBtn" id="btnRight">▶</div>
    <div class="mBtn" id="btnJump"><span>🅰</span><span style="font-size:0.5rem">JUMP</span></div>
  </div>
<div id="controls">← → / WASD move &nbsp;|&nbsp; SPACE / ↑ jump &nbsp;|&nbsp; Stomp enemies &nbsp;|&nbsp; Collect literary words!</div>

const PROF_W = 180;

// ─── Audio ───────────────────────────────────────────────
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function beep(freq,dur,type='square',vol=0.13){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function jumpSfx(){ensureAudio();beep(440,0.07,'square',0.11);setTimeout(()=>beep(660,0.09,'square',0.09),55);}
function collectSfx(){ensureAudio();beep(880,0.05,'sine',0.13);setTimeout(()=>beep(1320,0.11,'sine',0.11),45);}
function hurtSfx(){ensureAudio();beep(180,0.17,'sawtooth',0.16);}
function stompSfx(){ensureAudio();beep(260,0.04,'square',0.18);setTimeout(()=>beep(130,0.09,'square',0.13),38);}
function levelSfx(){ensureAudio();[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.17,'sine',0.14),i*95));}

// ─── Photo ───────────────────────────────────────────────
let faceImg=null;


// ─── Utils ───────────────────────────────────────────────
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// ─── Particles ───────────────────────────────────────────
const particles=[];
function spawnParticles(x,y,color,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=80+Math.random()*160;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-100,
      life:0.6+Math.random()*0.4,max:0.6+Math.random()*0.4,
      sz:4+Math.random()*5,color});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=400*dt;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(ox){
  particles.forEach(p=>{
    ctx.globalAlpha=clamp(p.life/p.max,0,1);
    ctx.fillStyle=p.color;
    const s=p.sz*(p.life/p.max);
    ctx.fillRect(p.x-ox-s/2,p.y-s/2,s,s);
  });
  ctx.globalAlpha=1;
}

// ─── Floating Texts ──────────────────────────────────────
const floats=[];
function addFloat(x,y,text,color='#ffd700'){
  floats.push({x,y,text,color,life:1.1,max:1.1});
}
function updateFloats(dt){
  for(let i=floats.length-1;i>=0;i--){
    floats[i].y-=55*dt;floats[i].life-=dt;
    if(floats[i].life<=0)floats.splice(i,1);
  }
}
function drawFloats(ox){
  floats.forEach(f=>{
    ctx.save();
    ctx.globalAlpha=clamp(f.life/f.max,0,1);
    ctx.fillStyle=f.color;
    ctx.font='bold 11px "Press Start 2P",monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.text,f.x-ox,f.y);
    ctx.restore();
  });
}

// ─── Quote Flash ─────────────────────────────────────────
let quoteFlash={text:'',life:0,color:'#fff'};
function flashQuote(text,color='#ffd700'){quoteFlash={text,life:2.8,color};}
function drawQuoteFlash(){
  if(quoteFlash.life<=0)return;
  ctx.save();
  ctx.globalAlpha=Math.min(1,quoteFlash.life*0.8);
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,H-70,W,60);
  ctx.fillStyle=quoteFlash.color;
  ctx.font='italic 13px "Crimson Text",serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  // wrap text
  const words=quoteFlash.text.split(' ');let line='';const lines=[];
  words.forEach(w=>{
    const test=line+w+' ';
    if(ctx.measureText(test).width>W-40&&line!=''){lines.push(line);line=w+' ';}
    else line=test;
  });
  lines.push(line);
  lines.forEach((l,i)=>ctx.fillText(l.trim(),W/2,H-58+i*18));
  ctx.restore();
}

  x:60,y:270,w:TILE-8,h:TILE-4,

// ─── Input ───────────────────────────────────────────────
const keys={};
let tLeft=false,tRight=false,tJump=false,tJumpConsumed=false;
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight','ArrowDown'].includes(e.code))e.preventDefault();
  ensureAudio();
  if(state.mode==='title'&&(e.code==='Space'||e.code==='Enter'))beginIntro();
  if(state.mode==='win'&&(e.code==='Space'||e.code==='Enter')){state.mode='title';}
  if(state.mode==='dead'&&state.deathTimer<=0){
    if(state.lives>0)doRestartLevel();else{state.mode='title';}
  }
});
document.addEventListener('keyup',e=>keys[e.code]=false);

function bindBtn(id,down,up){
  const el=document.getElementById(id);if(!el)return;
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{
    e.preventDefault();e.stopPropagation();ensureAudio();
    el.classList.add('pressed');down();
  },{passive:false}));
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>el.addEventListener(ev,e=>{
    e.preventDefault();el.classList.remove('pressed');up();
  },{passive:false}));
}
bindBtn('btnLeft',()=>tLeft=true,()=>tLeft=false);
bindBtn('btnRight',()=>tRight=true,()=>tRight=false);
bindBtn('btnJump',()=>{tJump=true;if(state.mode==='title')beginIntro();if(state.mode==='win')state.mode='title';if(state.mode==='dead'&&state.deathTimer<=0){if(state.lives>0)doRestartLevel();else state.mode='title';}},()=>{tJump=false;tJumpConsumed=false;});

// ─── Load Level ───────────────────────────────────────────
function loadLevel(idx){
  const L=LEVELS[idx];
  tileMap=L.tiles.map(r=>[...r]);
  enemies=L.enemies.map(e=>({
    x:e.col*TILE+4,y:e.row*TILE-TILE+4,
    w:TILE-8,h:TILE-4,
    vx:-65,vy:0,alive:true,stomped:false,stompTimer:0,
    type:e.type,animT:0,
  }));
  coinObjs=L.coins.map((c,i)=>({
    x:c.col*TILE+TILE/2,y:(c.row-1)*TILE+TILE/2,
    r:11,collected:false,
    bobOff:i*0.9,
    word:L.collectWord[i%L.collectWord.length],
    color:L.collectColor,emoji:L.collectEmoji,
  }));
  const ps=L.playerStart;
  player.x=ps.x;player.y=ps.y;
  player.vx=0;player.vy=0;player.grounded=false;
  player.facingRight=true;player.animFrame=0;player.animTimer=0;player.invincible=0;
  camera.x=0;state.darkness=0;
  wobbleTime=0;
  particles.length=0;floats.length=0;
}

function beginIntro(){
  state.mode='introCard';
  state.introTimer=4.5;
  loadLevel(state.level);
  levelSfx();
}
function startPlay(){state.mode='playing';}
function doRestartLevel(){state.mode='playing';loadLevel(state.level);}
function doNextLevel(){
  state.level++;
  if(state.level>=LEVELS.length){state.mode='win';return;}
  state.mode='introCard';state.introTimer=4.5;
  loadLevel(state.level);levelSfx();
}

// ─── Tile Helpers ─────────────────────────────────────────
function getTile(c,r){
  if(r<0||r>=tileMap.length||c<0||c>=tileMap[0].length)return 1;
  return tileMap[r][c];
}
function isSolid(t){return[1,2,3,5,6,7,8].includes(t);}

// ─── Physics ─────────────────────────────────────────────
function resolvePlayer(dt){
  const P=player,pw=P.w,ph=P.h;
  const goL=(keys['ArrowLeft']||keys['KeyA']||tLeft);
  const goR=(keys['ArrowRight']||keys['KeyD']||tRight);
  const doJ=(keys['ArrowUp']||keys['KeyW']||keys['Space']||(!tJumpConsumed&&tJump));

  if(goL){P.vx-=1750*dt;P.facingRight=false;}
  if(goR){P.vx+=1750*dt;P.facingRight=true;}
  if(!goL&&!goR)P.vx*=Math.pow(0.01,dt);
  P.vx=clamp(P.vx,-WALK_SPEED,WALK_SPEED);

  if(doJ&&P.grounded){
    P.vy=JUMP_FORCE;P.grounded=false;jumpSfx();
    if(tJump)tJumpConsumed=true;
  }
  P.vy+=GRAVITY*dt;P.vy=clamp(P.vy,-2000,MAX_FALL);

  P.animTimer+=dt;
  if(P.animTimer>0.1){P.animFrame=(P.animFrame+1)%4;P.animTimer=0;}

  // X
  P.x+=P.vx*dt;P.x=clamp(P.x,0,WORLD_W-pw);
  collideTilesX();
  // Y
  P.y+=P.vy*dt;P.grounded=false;
  collideTilesY();

  if(P.y>H+20)killPlayer(true);
  if(P.invincible>0)P.invincible-=dt;
}

function collideTilesX(){
  const P=player,pw=P.w,ph=P.h;
  const r0=Math.floor(P.y/TILE),r1=Math.floor((P.y+ph-1)/TILE);
  const c0=Math.floor(P.x/TILE),c1=Math.floor((P.x+pw-1)/TILE);
  for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){
    if(isSolid(getTile(c,r))){
      const tx=c*TILE;
      if(P.vx>0&&P.x+pw>tx&&P.x<tx){P.x=tx-pw;P.vx=0;}
      if(P.vx<0&&P.x<tx+TILE&&P.x+pw>tx){P.x=tx+TILE;P.vx=0;}
    }
  }
}
function collideTilesY(){
  const P=player,pw=P.w,ph=P.h;
  const r0=Math.floor(P.y/TILE),r1=Math.floor((P.y+ph-1)/TILE);
  const c0=Math.floor(P.x/TILE),c1=Math.floor((P.x+pw-1)/TILE);
  for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){
    const t=getTile(c,r);
    if(isSolid(t)){
      const ty=r*TILE;
      if(P.vy>0&&P.y+ph>ty&&P.y<ty){P.y=ty-ph;P.vy=0;P.grounded=true;}
      if(P.vy<0&&P.y<ty+TILE&&P.y+ph>ty){
        P.y=ty+TILE;P.vy=0;
        if(t===3){
          const L=LEVELS[state.level];
          tileMap[r][c]=2;
          spawnParticles(c*TILE+TILE/2,r*TILE,L.collectColor,14);
          collectSfx();state.score+=50;state.coins++;
          const w=L.collectWord[Math.floor(Math.random()*L.collectWord.length)];
          addFloat(c*TILE+TILE/2,r*TILE,w,L.collectColor);
        }
      }
    }
  }
}

function killPlayer(fell=false){
  if(player.invincible>0&&!fell)return;
  hurtSfx();
  state.lives--;
  state.mode='dead';state.deathTimer=2.2;
  spawnParticles(player.x+player.w/2,player.y+player.h/2,'#ff4444',22);
  flashQuote(LEVELS[state.level].deathMsg,'#ff8888');
}

// ─── Enemies ─────────────────────────────────────────────
function updateEnemies(dt){
  const L=LEVELS[state.level];
  enemies.forEach(e=>{
    if(!e.alive)return;
    e.animT+=dt;
    if(e.stomped){e.stompTimer-=dt;if(e.stompTimer<=0)e.alive=false;return;}
    e.vy+=GRAVITY*dt;e.vy=clamp(e.vy,-2000,MAX_FALL);
    e.x+=e.vx*dt;e.y+=e.vy*dt;
    // tile X
    const c0=Math.floor(e.x/TILE),c1=Math.floor((e.x+e.w-1)/TILE);
    const r0=Math.floor(e.y/TILE),r1=Math.floor((e.y+e.h-1)/TILE);
    for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){
      if(isSolid(getTile(c,r))){
        const tx=c*TILE;
        if(e.vx>0&&e.x+e.w>tx){e.x=tx-e.w;e.vx*=-1;}
        if(e.vx<0&&e.x<tx+TILE){e.x=tx+TILE;e.vx*=-1;}
      }
    }
    // tile Y
    for(let r=Math.floor(e.y/TILE);r<=Math.floor((e.y+e.h-1)/TILE);r++)
      for(let c=Math.floor(e.x/TILE);c<=Math.floor((e.x+e.w-1)/TILE);c++){
        if(isSolid(getTile(c,r))){
          const ty=r*TILE;
          if(e.vy>0&&e.y+e.h>ty){e.y=ty-e.h;e.vy=0;}
          if(e.vy<0&&e.y<ty+TILE){e.y=ty+TILE;e.vy=0;}
        }
      }
    if(e.y>H+80){e.alive=false;return;}
    // player collision
    if(player.invincible<=0){
      const px=player.x,py=player.y,pw=player.w,ph=player.h;
      if(px<e.x+e.w&&px+pw>e.x&&py<e.y+e.h&&py+ph>e.y){
        if(player.vy>0&&py+ph<e.y+e.h*0.55){
          e.stomped=true;e.stompTimer=0.35;
          player.vy=-420;stompSfx();state.score+=100;
          spawnParticles(e.x+e.w/2,e.y,L.collectColor,14);
          addFloat(e.x+e.w/2,e.y,'+100',L.collectColor);
          flashQuote(L.stompMsg,L.collectColor);
        } else {
          killPlayer();
          player.vy=-280;player.vx=(player.x<e.x?-1:1)*280;
          player.invincible=2.0;
        }
      }
    }
  });
}

// ─── Coins ───────────────────────────────────────────────
function updateCoins(dt){
  const L=LEVELS[state.level];
  coinObjs.forEach(c=>{
    if(c.collected)return;
    c.bobOff+=dt*2.8;
    const px=player.x+player.w/2,py=player.y+player.h/2;
    if(Math.hypot(px-c.x,py-c.y)<c.r+14){
      c.collected=true;collectSfx();state.score+=10;state.coins++;
      spawnParticles(c.x,c.y,c.color,10);
      addFloat(c.x,c.y,c.word,c.color);
    }
  });
}

// ─── Dylan Darkness ──────────────────────────────────────
function updateDarkness(dt){
  if(LEVELS[state.level].theme!=='dylan')return;
  state.darkness=clamp(state.darkness+dt*0.012,0,0.72);
}

// ─── Camera ──────────────────────────────────────────────
function updateCamera(){
  const tx=player.x+player.w/2-W/3;
  camera.x=lerp(camera.x,tx,0.09);
  camera.x=clamp(camera.x,0,WORLD_W-W);
}

// ─── Goal Check ──────────────────────────────────────────
function checkGoal(){
  if(player.x+player.w>WORLD_W-TILE*1.5){
    state.mode='transition';state.transTimer=3.0;
    state.transMsg=state.level<LEVELS.length-1?'Level '+(state.level+2)+' Unlocked!':'You Win! 🎓 A+';
    levelSfx();
  }
}

// ─── Grade Calc ──────────────────────────────────────────
function getGrade(s){
  if(s>=500)return'A+';if(s>=350)return'A';if(s>=250)return'B+';
  if(s>=150)return'B';if(s>=80)return'C';return'F';
}

function drawSky(L){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,L.bgTop);g.addColorStop(1,L.bgBottom);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawTagoreBg(){
  // Golden sunrise rays
  const cx=W*0.15,cy=H*0.35;
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2;
    ctx.save();ctx.globalAlpha=0.12;
    ctx.fillStyle='#ffe066';
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a-0.08)*W,cy+Math.sin(a-0.08)*W);
    ctx.lineTo(cx+Math.cos(a+0.08)*W,cy+Math.sin(a+0.08)*W);
    ctx.closePath();ctx.fill();ctx.restore();
  }
  // Sun
  ctx.save();ctx.globalAlpha=0.9;
  const sg=ctx.createRadialGradient(cx,cy,10,cx,cy,60);
  sg.addColorStop(0,'#fff7aa');sg.addColorStop(1,'#ff9900');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(cx,cy,55,0,Math.PI*2);ctx.fill();ctx.restore();
  // Floating words from poem
  ctx.save();ctx.globalAlpha=0.07;ctx.fillStyle='#7a5c00';
  ctx.font='bold 18px "Crimson Text",serif';ctx.textAlign='left';
  ['FREEDOM','REASON','KNOWLEDGE','LIGHT','TRUTH','HEAVEN'].forEach((w,i)=>{
    ctx.fillText(w,((i*170+camera.x*0.08)%(W+200))-100,(i%3)*60+40);
  });
  ctx.restore();
  // Hills
  ctx.save();ctx.fillStyle='#8bc34a';
  ctx.beginPath();ctx.moveTo(0,H-40);
  for(let x=0;x<=W;x+=20){ctx.lineTo(x,H-80-Math.sin((x+camera.x*0.2)*0.008)*30);}
  ctx.lineTo(W,H-40);ctx.closePath();ctx.fill();ctx.restore();
}

function drawHughesBg(ox){

  const signs=[
    {x:80,y:60,text:'JAZZ CLUB',color:'#ff4488'},
    {x:280,y:50,text:'HARLEM',color:'#44ffaa'},

    ctx.font='bold 15px "Press Start 2P",monospace';
    ctx.textAlign='center';ctx.fillText(s.text,sx,s.y);
    ctx.restore();
  });

  ctx.save();ctx.fillStyle='rgba(255,153,68,0.18)';ctx.font='22px sans-serif';

    const ny=50+Math.sin(Date.now()*0.002+i)*30;
    ctx.fillText(n,nx,ny);
  });
  ctx.restore();
  // Ground bar/stage
  ctx.save();ctx.fillStyle='#1a0a2e';

  const slx=(Math.sin(Date.now()*0.001)*0.3+0.5)*W;
  const slg=ctx.createRadialGradient(slx,H,10,slx,H-120,120);

  ctx.fillStyle=slg;ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function drawWallpaperBg(){
  // Pulsing yellow wallpaper pattern
  const t=Date.now()*0.001;
  ctx.save();ctx.globalAlpha=0.22;
  for(let x=0;x<W;x+=50)for(let y=0;y<H;y+=50){
    const pulse=Math.sin(t+x*0.04+y*0.04)*0.5+0.5;
    ctx.strokeStyle=`hsl(52,${60+pulse*30}%,${30+pulse*20}%)`;
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(x+25,y+25,10+pulse*8,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+50,y+50);ctx.stroke();
  }
  ctx.restore();
  // Creeping tendrils
  ctx.save();ctx.strokeStyle='rgba(150,120,0,0.12)';ctx.lineWidth=2;
  for(let i=0;i<8;i++){
    const bx=(i*130+Date.now()*0.02)%(W+200)-100;
    ctx.beginPath();ctx.moveTo(bx,H);
    ctx.bezierCurveTo(bx+20,H-100,bx-20,H-200,bx+10,H-300);
    ctx.stroke();
  }
  ctx.restore();
  // Text on walls
  ctx.save();ctx.globalAlpha=0.06;ctx.fillStyle='#5c4700';
  ctx.font='italic 16px "Crimson Text",serif';ctx.textAlign='left';
  ['ESCAPE','PATTERN','MADNESS','CREEP','BARS'].forEach((w,i)=>{
    ctx.fillText(w,((i*160+camera.x*0.05)%(W+200))-60,30+i*40);
  });
  ctx.restore();
}

function drawDylanBg(){
  // Fading stars
  ctx.save();
  [[60,40,'#fff'],[180,25,'#aaf'],[300,55,'#fff'],[420,30,'#ffa'],[540,45,'#fff'],
   [660,20,'#aaf'],[120,80,'#fff'],[380,90,'#ffa'],[600,70,'#fff']].forEach(([x,y,c])=>{
    const t=(Date.now()*0.0004)%1;
    ctx.globalAlpha=(0.3+Math.sin(Date.now()*0.002+x)*0.3)*(1-state.darkness);
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
  // Dying sun on right edge
  const sx=W-80,sy=100;
  ctx.save();ctx.globalAlpha=0.6*(1-state.darkness);
  const dg=ctx.createRadialGradient(sx,sy,5,sx,sy,50);
  dg.addColorStop(0,'#ff6600');dg.addColorStop(1,'rgba(255,60,0,0)');
  ctx.fillStyle=dg;ctx.beginPath();ctx.arc(sx,sy,50,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Rage text
  ctx.save();ctx.globalAlpha=0.06;ctx.fillStyle='#ff6600';
  ctx.font='bold 20px "Crimson Text",serif';ctx.textAlign='left';
  ['RAGE','LIGHT','RESIST','WILD','FIERCE'].forEach((w,i)=>{
    ctx.fillText(w,((i*180+camera.x*0.06)%(W+200))-80,20+i*50);
  });
  ctx.restore();
}

function drawBgByTheme(ox){
  const L=LEVELS[state.level];
  drawSky(L);
  if(L.theme==='tagore')drawTagoreBg();
  else if(L.theme==='hughes')drawHughesBg(ox);
  else if(L.theme==='wallpaper')drawWallpaperBg();
  else if(L.theme==='dylan')drawDylanBg();
  // darkness overlay for Dylan level
  if(state.darkness>0){
    ctx.save();ctx.fillStyle=`rgba(0,0,0,${state.darkness})`;
    ctx.fillRect(0,0,W,H);ctx.restore();
  }
}

// ─── Tiles ───────────────────────────────────────────────
function drawTiles(ox){
  const L=LEVELS[state.level];
  for(let r=0;r<tileMap.length;r++)for(let c=0;c<tileMap[r].length;c++){
    const t=tileMap[r][c];if(t===0)continue;
    const tx=c*TILE-ox,ty=r*TILE;
    if(tx+TILE<0||tx>W)continue;

    if(t===1){
      // Theme-coloured ground
      const gc=L.theme==='tagore'?'#5b8a3c':L.theme==='hughes'?'#2d1b4e':L.theme==='wallpaper'?'#6b5a00':'#1a0030';
      const gc2=L.theme==='tagore'?'#4a7c2f':L.theme==='hughes'?'#1a0a2e':L.theme==='wallpaper'?'#4a3d00':'#0a0020';
      const gc3=L.theme==='tagore'?'#6aad44':L.theme==='hughes'?'#3d2b5e':L.theme==='wallpaper'?'#8a7200':'#2a0050';
      ctx.fillStyle=gc;ctx.fillRect(tx,ty,TILE,TILE);
      ctx.fillStyle=gc2;ctx.fillRect(tx,ty+6,TILE,TILE-6);
      ctx.fillStyle=gc3;ctx.fillRect(tx,ty,TILE,6);
      ctx.fillStyle='rgba(0,0,0,0.07)';
      for(let i=0;i<TILE;i+=8)ctx.fillRect(tx+i,ty+8,4,TILE-8);
    } else if(t===2){
      const bc=L.theme==='wallpaper'?'#8a7200':L.theme==='dylan'?'#1a0030':'#c8723a';
      ctx.fillStyle=bc;ctx.fillRect(tx,ty,TILE,TILE);
      ctx.fillStyle='rgba(0,0,0,0.2)';
      ctx.fillRect(tx,ty+TILE/2-2,TILE,4);ctx.fillRect(tx+TILE/2-2,ty,4,TILE);
      ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(tx+2,ty+2,TILE/2-4,TILE/2-4);
    } else if(t===3){
      const pulse=0.04*Math.sin(Date.now()*0.007);
      ctx.fillStyle=L.collectColor;ctx.fillRect(tx+pulse*20,ty+pulse*20,TILE-pulse*40,TILE-pulse*40);
      ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(tx+4,ty+4,TILE-8,6);
      ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('?',tx+TILE/2,ty+TILE/2);
    } else if(t===5||t===6){
      ctx.fillStyle='#3a9a3a';ctx.fillRect(tx,ty,TILE,TILE);
      ctx.fillStyle='#2d8020';ctx.fillRect(tx+2,ty+2,TILE-4,TILE-4);
      ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(tx+4,ty+4,6,TILE-8);
    } else if(t===7||t===8){
      ctx.fillStyle='#2d8020';ctx.fillRect(tx,ty,TILE,TILE);
      ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(tx,ty,3,TILE);ctx.fillRect(tx+TILE-3,ty,3,TILE);
    }
  }
}

// ─── Player Draw ─────────────────────────────────────────
function drawPlayer(ox){
  const P=player;
  const px=P.x-ox,py=P.y,pw=P.w,ph=P.h;
  if(P.invincible>0&&Math.floor(P.invincible*8)%2===0)return;
  if(!PROF_IMG.complete||PROF_IMG.naturalWidth===0){drawPlayerFallback(ox);return;}
  const dw=pw*2.0,dh=dw*(PROF_H/PROF_W);
  const dx=px+pw/2-dw/2,dy=py+ph-dh*0.88;
  ctx.save();
  if(!P.facingRight){ctx.translate(px+pw/2,0);ctx.scale(-1,1);ctx.drawImage(PROF_IMG,-dw/2,dy,dw,dh);}
  else{ctx.drawImage(PROF_IMG,dx,dy,dw,dh);}
  ctx.restore();
}
function drawPlayerFallback(ox){
  const P=player;
  const px=P.x-ox, py=P.y;
  const r=P.w/2+2, cx=px+P.w/2, cy=py+P.h/2;
  if(P.invincible>0&&Math.floor(P.invincible*8)%2===0)return;
  ctx.save();
  if(!P.facingRight){ctx.translate(cx*2,0);ctx.scale(-1,1);}
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#f7d87c';ctx.fill();ctx.strokeStyle='#b8860b';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.arc(cx-r*0.28,cy-r*0.15,r*0.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+r*0.28,cy-r*0.15,r*0.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a1a3e';ctx.fillRect(cx-r*0.7,cy-r*1.12,r*1.4,r*0.22);
  ctx.beginPath();ctx.moveTo(cx,cy-r*1.38);ctx.lineTo(cx-r*0.8,cy-r*1.02);ctx.lineTo(cx+r*0.8,cy-r*1.02);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx+r*0.55,cy-r*1.12);ctx.lineTo(cx+r*0.65,cy-r*0.65);ctx.stroke();
  ctx.restore();
}

// ─── Enemy Draw ──────────────────────────────────────────
function drawEnemies(ox){
  const L=LEVELS[state.level];
  enemies.forEach(e=>{
    if(!e.alive)return;
    const ex=e.x-ox,ey=e.y;
    if(ex+e.w<0||ex>W)return;
    ctx.save();
    if(e.stomped){ctx.globalAlpha=Math.max(0,e.stompTimer/0.35);ctx.transform(1,0,0,0.3,0,ey+e.h*0.85);}

    if(e.type==='fear'){
      // Shadowy fear demon
      const pulse=0.12*Math.sin(e.animT*4);
      ctx.fillStyle='#1a0030';
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h*0.65,e.w/2+pulse*10,e.h*0.52,0,0,Math.PI*2);ctx.fill();
      // red eyes
      ctx.fillStyle='#ff2200';ctx.shadowColor='#ff2200';ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(ex+e.w*0.33,ey+e.h*0.42,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex+e.w*0.67,ey+e.h*0.42,4,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      // wispy tendrils
      ctx.strokeStyle='rgba(80,0,80,0.5)';ctx.lineWidth=2;
      for(let i=0;i<4;i++){
        const a=e.animT*2+i*Math.PI/2;
        ctx.beginPath();ctx.moveTo(ex+e.w/2,ey+e.h*0.65);
        ctx.lineTo(ex+e.w/2+Math.cos(a)*18,ey+e.h*0.65+Math.sin(a)*12);ctx.stroke();
      }
      ctx.fillStyle='rgba(150,0,200,0.22)';
      ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h*0.65,e.w/2+8+pulse*15,0,Math.PI*2);ctx.fill();
    } else if(e.type==='heckler'){
      // Bowtie jazz heckler
      ctx.fillStyle='#2d1b4e';
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h*0.6,e.w/2,e.h*0.55,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#e8b89a';
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h*0.3,e.w*0.33,e.h*0.30,0,0,Math.PI*2);ctx.fill();
      // bowtie
      ctx.fillStyle='#ff4488';
      ctx.beginPath();ctx.moveTo(ex+e.w*0.35,ey+e.h*0.55);ctx.lineTo(ex+e.w*0.5,ey+e.h*0.62);ctx.lineTo(ex+e.w*0.65,ey+e.h*0.55);ctx.lineTo(ex+e.w*0.5,ey+e.h*0.48);ctx.closePath();ctx.fill();
      ctx.fillStyle='#1a1a1a';
      ctx.beginPath();ctx.arc(ex+e.w*0.38,ey+e.h*0.27,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex+e.w*0.62,ey+e.h*0.27,3,0,Math.PI*2);ctx.fill();
      // music note above
      ctx.fillStyle='#ff9944';ctx.font='16px sans-serif';ctx.textAlign='center';
      ctx.fillText(['♩','♪','♫'][Math.floor(e.animT*2)%3],ex+e.w/2,ey-5);
    } else if(e.type==='creeper'){
      // Creeping woman from wallpaper
      ctx.fillStyle='#8a7200';
      ctx.save();ctx.translate(ex+e.w/2,ey+e.h*0.5);
      ctx.scale(1,0.6); // flattened, creeping
      ctx.beginPath();ctx.ellipse(0,0,e.w/2,e.h*0.5,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // face
      ctx.fillStyle='#d4b896';
      ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h*0.3,e.w*0.28,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#1a1a1a';
      ctx.beginPath();ctx.arc(ex+e.w*0.38,ey+e.h*0.27,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex+e.w*0.62,ey+e.h*0.27,3,0,Math.PI*2);ctx.fill();
      // crawling arms
      const crawl=Math.sin(e.animT*5)*8;
      ctx.strokeStyle='#8a7200';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(ex+4,ey+e.h*0.55);ctx.lineTo(ex-8,ey+e.h*0.7+crawl);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+e.w-4,ey+e.h*0.55);ctx.lineTo(ex+e.w+8,ey+e.h*0.7-crawl);ctx.stroke();
      // wallpaper pattern on body
      ctx.strokeStyle='rgba(180,160,0,0.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h*0.55,12,0,Math.PI*2);ctx.stroke();
    } else if(e.type==='night'){
      // Night entity
      const t2=e.animT;
      ctx.fillStyle='rgba(0,0,0,0.85)';
      ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h*0.5,e.w/2+4+Math.sin(t2*3)*4,0,Math.PI*2);ctx.fill();
      // dim stars within
      ctx.fillStyle='rgba(100,100,200,0.5)';
      ctx.beginPath();ctx.arc(ex+e.w*0.35,ey+e.h*0.4,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ex+e.w*0.65,ey+e.h*0.4,2,0,Math.PI*2);ctx.fill();
      // crescent outline
      ctx.strokeStyle='rgba(100,80,200,0.6)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h*0.5,e.w/2+4,0,Math.PI*2);ctx.stroke();
      // rage fire at stomp
    }
    ctx.restore();
  });
}

// ─── Coins Draw ──────────────────────────────────────────
function drawCoins(ox){
  coinObjs.forEach(c=>{
    if(c.collected)return;
    const cx=c.x-ox,cy=c.y+Math.sin(c.bobOff)*5;
    ctx.save();
    const g=ctx.createRadialGradient(cx,cy,2,cx,cy,c.r+5);
    g.addColorStop(0,c.color+'88');g.addColorStop(1,c.color+'00');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,c.r+5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c.color;ctx.beginPath();ctx.arc(cx,cy,c.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(cx-2,cy-2,c.r*0.4,0,Math.PI*2);ctx.fill();
    // emoji
    ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.emoji,cx,cy);
    ctx.restore();
  });
}

// ─── Flag Pole ───────────────────────────────────────────
function drawFlagPole(ox){
  const px=WORLD_W-TILE*1.5-ox;
  ctx.fillStyle='#aaa';ctx.fillRect(px+15,H-TILE*3-40,6,TILE*3+40);
  const L=LEVELS[state.level];
  ctx.fillStyle=L.collectColor;
  ctx.beginPath();ctx.moveTo(px+21,H-TILE*3-40);
  ctx.lineTo(px+43,H-TILE*3-28);ctx.lineTo(px+21,H-TILE*3-16);
  ctx.closePath();ctx.fill();
  // label
  ctx.save();ctx.fillStyle='#fff';ctx.font='bold 8px "Press Start 2P",monospace';
  ctx.textAlign='center';ctx.fillText('END',px+32,H-TILE*3-5);ctx.restore();
}

// ─── HUD ─────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hudScore').textContent='SCORE: '+state.score;
  document.getElementById('hudGrade').textContent='GRADE: '+getGrade(state.score);
  document.getElementById('hudLives').textContent='♥'.repeat(Math.max(0,state.lives));
  document.getElementById('hudCoins').textContent='📖 '+state.coins;
}

// ─── Intro Card ──────────────────────────────────────────
function drawIntroCard(L,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  // paper background
  const pg=ctx.createLinearGradient(W/2-200,H/2-150,W/2+200,H/2+150);
  pg.addColorStop(0,'#fffff0');pg.addColorStop(1,'#f5f0d0');
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=30;
  ctx.fillStyle=pg;ctx.fillRect(W/2-210,H/2-165,420,330);
  ctx.shadowBlur=0;
  // border
  ctx.strokeStyle='#b8860b';ctx.lineWidth=3;ctx.strokeRect(W/2-210,H/2-165,420,330);
  ctx.strokeStyle='#b8860b';ctx.lineWidth=1;ctx.strokeRect(W/2-205,H/2-160,410,320);
  // course stamp top
  ctx.fillStyle='#8b0000';ctx.font='bold 8px "Press Start 2P",monospace';
  ctx.textAlign='center';ctx.fillText('📚 PROF. ATANU\'S ENG CLASS',W/2,H/2-140);
  // title
  ctx.fillStyle='#1a1a3e';ctx.font='bold 16px "Crimson Text",serif';
  ctx.textAlign='center';
  // wrap title
  const titleWords=L.title.split(' ');let tline='';const tlines=[];
  titleWords.forEach(w=>{
    if((tline+w).length>28&&tline!=''){tlines.push(tline.trim());tline=w+' ';}
    else tline+=w+' ';
  });
  tlines.push(tline.trim());
  tlines.forEach((tl,i)=>ctx.fillText('"'+tl+(i===tlines.length-1?'"':''),W/2,H/2-110+i*22));
  // author + year
  ctx.fillStyle='#444';ctx.font='italic 14px "Crimson Text",serif';
  ctx.fillText('— '+L.author+', '+L.year,W/2,H/2-60);
  // divider
  ctx.strokeStyle='#b8860b';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-160,H/2-48);ctx.lineTo(W/2+160,H/2-48);ctx.stroke();
  // quote
  ctx.fillStyle='#2a2a2a';ctx.font='italic 13px "Crimson Text",serif';
  const qwords=L.quote.split(' ');let qline='';const qlines=[];
  qwords.forEach(w=>{
    const t=qline+w+' ';
    if(ctx.measureText(t).width>340&&qline!=''){qlines.push(qline);qline=w+' ';}
    else qline=t;
  });
  qlines.push(qline);
  qlines.forEach((ql,i)=>ctx.fillText(ql.trim(),W/2,H/2-25+i*19));
  // enemy note
  ctx.fillStyle='#8b0000';ctx.font='bold 9px "Nunito",sans-serif';
  ctx.fillText('⚠ ENEMIES: '+L.enemyType,W/2,H/2+70);
  ctx.fillStyle='#555';ctx.font='9px "Nunito",sans-serif';
  ctx.fillText(L.enemyDesc,W/2,H/2+88);
  // collectibles
  ctx.fillStyle='#1a6b1a';ctx.font='bold 9px "Nunito",sans-serif';
  ctx.fillText('✦ COLLECT: '+L.collectWord.slice(0,3).join(' · ')+'...',W/2,H/2+108);
  // A+ stamp
  if(PROF_IMG.complete&&PROF_IMG.naturalWidth>0){
    const sw=60,sh=sw*(PROF_H/PROF_W);
    ctx.drawImage(PROF_IMG,W/2+170-sw/2,H/2-168,sw,sh);
  } else {
    ctx.fillStyle='#8b0000';ctx.font='bold 22px "Press Start 2P",monospace';
    ctx.textAlign='center';ctx.fillText('A+',W/2+170,H/2-118);
  }
  ctx.fillStyle='#8b0000';ctx.font='bold 8px "Press Start 2P",monospace';
  ctx.textAlign='center';ctx.fillText('PROF. ATANU',W/2+170,H/2-87);
  // bottom continue
  const blink=Math.floor(Date.now()*0.002)%2===0;
  ctx.fillStyle=blink?'#8b0000':'rgba(139,0,0,0)';
  ctx.font='bold 8px "Press Start 2P",monospace';
  ctx.fillText('PRESS SPACE TO BEGIN',W/2,H/2+140);
  ctx.restore();
}

// ─── Title Screen ─────────────────────────────────────────
function drawTitle(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a3a');g.addColorStop(1,'#1a0a4a');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // stars
  ctx.fillStyle='rgba(255,255,255,0.7)';
  [[50,30],[150,60],[300,20],[450,50],[600,30],[700,70],[100,100],[350,80],[550,90],[720,45],[200,130],[480,110]].forEach(([x,y])=>{
    ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();
  });
  // main title
  ctx.fillStyle='#ffd700';ctx.font='bold 20px "Press Start 2P",monospace';
  ctx.textAlign='center';ctx.shadowColor='#ffd700';ctx.shadowBlur=20;
  ctx.fillText('SUPER ATANU BROS',W/2,80);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='bold 9px "Press Start 2P",monospace';
  ctx.fillText('ENG CLASS EDITION',W/2,105);
  ctx.fillStyle='rgba(255,215,0,0.6)';ctx.font='italic 12px "Crimson Text",serif';
  ctx.fillText('"A literary platformer by Prof. Atanu\'s students"',W/2,130);

  // character
  if(PROF_IMG.complete&&PROF_IMG.naturalWidth>0){
    const tw=120,th=tw*(PROF_H/PROF_W);
    ctx.drawImage(PROF_IMG,W/2-tw/2,155,tw,th);
  } else {
    const cx=W/2,cy=220,r=40;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fillStyle='#f7d87c';ctx.fill();ctx.strokeStyle='#b8860b';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(cx-12,cy-6,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+12,cy-6,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a3e';ctx.fillRect(cx-r*0.75,cy-r*1.15,r*1.5,r*0.22);
    ctx.beginPath();ctx.moveTo(cx,cy-r*1.4);ctx.lineTo(cx-r*0.85,cy-r*1.05);ctx.lineTo(cx+r*0.85,cy-r*1.05);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx+r*0.58,cy-r*1.15);ctx.lineTo(cx+r*0.68,cy-r*0.68);ctx.stroke();
  }

  // levels preview
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(W/2-300,275,600,100);
  ctx.strokeStyle='rgba(255,215,0,0.2)';ctx.lineWidth=1;ctx.strokeRect(W/2-300,275,600,100);
  ctx.fillStyle='#ffd700';ctx.font='bold 7px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('4 LEVELS BASED ON YOUR ENG TEXTS:',W/2,292);
  const lvlNames=['1. Tagore – Fear→Freedom','2. Hughes – Jazz & Identity','3. Gilman – Yellow Wallpaper','4. Thomas – Rage vs Night'];
  const lColors=['#ffd700','#ff9944','#ffe066','#ff6633'];
  lvlNames.forEach((n,i)=>{
    ctx.fillStyle=lColors[i];ctx.font='7px "Press Start 2P",monospace';
    ctx.fillText(n,W/2-150+(i%2)*300,310+Math.floor(i/2)*22);
  });

  const blink=Math.floor(Date.now()*0.0015)%2===0;
  ctx.fillStyle=blink?'#fff':'rgba(255,255,255,0)';
  ctx.font='bold 9px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('PRESS SPACE / ENTER TO START',W/2,400);
  ctx.fillStyle='#555';ctx.font='8px "Press Start 2P",monospace';
  ctx.fillText('← → WASD: MOVE    SPACE/↑: JUMP    STOMP ENEMIES    COLLECT WORDS',W/2,425);
}

// ─── Win Screen ──────────────────────────────────────────
function drawWin(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#fffff0');g.addColorStop(1,'#f5f0d0');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#8b0000';ctx.strokeStyle='#b8860b';ctx.lineWidth=3;
  ctx.strokeRect(20,20,W-40,H-40);ctx.strokeRect(26,26,W-52,H-52);
  ctx.font='bold 12px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText('📚 ENG CLASS — FINAL GRADE 📚',W/2,65);
  ctx.fillStyle='#1a1a3e';ctx.font='bold 36px "Crimson Text",serif';
  ctx.fillText('Excellent Work!',W/2,130);
  if(PROF_IMG.complete&&PROF_IMG.naturalWidth>0){
    const vw=110,vh=vw*(PROF_H/PROF_W);
    ctx.drawImage(PROF_IMG,W/2-vw/2,158,vw,vh);
  } else if(faceImg){
    ctx.save();ctx.beginPath();ctx.arc(W/2,200,55,0,Math.PI*2);ctx.clip();ctx.drawImage(faceImg,W/2-55,145,110,110);ctx.restore();
    ctx.strokeStyle='#b8860b';ctx.lineWidth=3;ctx.beginPath();ctx.arc(W/2,200,55,0,Math.PI*2);ctx.stroke();
  } else {
    ctx.fillStyle='#ffd700';ctx.font='bold 40px "Press Start 2P",monospace';ctx.fillText('A+',W/2,215);
  }
  ctx.fillStyle='#8b0000';ctx.font='italic 13px "Crimson Text",serif';
  ctx.fillText('"Your mind is without fear. You raged against the night."',W/2,285);
  ctx.fillStyle='#444';ctx.font='bold 10px "Press Start 2P",monospace';
  ctx.fillText('FINAL SCORE: '+state.score+'   GRADE: '+getGrade(state.score),W/2,320);
  ctx.fillStyle='#888';ctx.font='8px "Nunito",sans-serif';
  ctx.fillText('Words collected: '+state.coins+' | Lives remaining: '+state.lives,W/2,345);
  ctx.fillStyle='#b8860b';ctx.font='italic 11px "Crimson Text",serif';
  ctx.fillText('— Prof. Atanu ✏️',W/2,375);
  const blink=Math.floor(Date.now()*0.0015)%2===0;
  ctx.fillStyle=blink?'#8b0000':'rgba(139,0,0,0)';
  ctx.font='bold 8px "Press Start 2P",monospace';
  ctx.fillText('PRESS SPACE TO PLAY AGAIN',W/2,415);
}

// ─── Dead Overlay ─────────────────────────────────────────
function drawDeadOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ff4444';ctx.font='bold 18px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText(state.lives>0?'YOU FELL...':'GAME OVER',W/2,H/2-40);
  ctx.fillStyle='#fff';ctx.font='10px "Press Start 2P",monospace';
  ctx.fillText(state.lives>0?'Lives: '+state.lives+' | Press SPACE to retry':'Press SPACE to restart',W/2,H/2+10);
  ctx.fillStyle='#888';ctx.font='italic 12px "Crimson Text",serif';
  const L=LEVELS[state.level];
  ctx.fillText(L.deathMsg,W/2,H/2+50);
}

// ─── Transition Overlay ───────────────────────────────────
function drawTransOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffd700';ctx.font='bold 18px "Press Start 2P",monospace';ctx.textAlign='center';
  ctx.fillText(state.transMsg,W/2,H/2-20);
  ctx.fillStyle='#fff';ctx.font='10px "Press Start 2P",monospace';
  ctx.fillText('Score: '+state.score+'  |  Grade: '+getGrade(state.score),W/2,H/2+25);
}

// ════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════
let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  const ox=Math.round(camera.x);
  ctx.clearRect(0,0,W,H);

  if(state.mode==='title'){drawTitle();updateHUD();return;}
  if(state.mode==='win'){drawWin();return;}

  if(state.mode==='introCard'){
    const L=LEVELS[state.level];
    state.introTimer-=dt;
    const alpha=clamp(Math.min((4.5-state.introTimer)*2,1,(state.introTimer)*2),0,1);
    // draw game world behind
    drawBgByTheme(ox);drawTiles(ox);drawFlagPole(ox);
    drawIntroCard(L,alpha);
    // allow space to skip
    if((keys['Space']||keys['Enter']||(!tJumpConsumed&&tJump))||state.introTimer<=0){
      startPlay();
    }
    updateHUD();
    return;
  }

  if(state.mode==='dead'){
    state.deathTimer-=dt;
    updateParticles(dt);
    drawBgByTheme(ox);drawTiles(ox);drawFlagPole(ox);
    drawCoins(ox);drawParticles(ox);drawEnemies(ox);
    drawPlayer(ox);
    updateFloats(dt);drawFloats(ox);
    drawQuoteFlash();
    drawDeadOverlay();
    updateHUD();
    return;
  }

  if(state.mode==='transition'){
    state.transTimer-=dt;
    drawBgByTheme(ox);drawTiles(ox);drawFlagPole(ox);
    drawCoins(ox);updateParticles(dt);drawParticles(ox);
    drawEnemies(ox);drawPlayer(ox);
    updateFloats(dt);drawFloats(ox);
    drawTransOverlay();
    updateHUD();
    if(state.transTimer<=0)doNextLevel();
    return;
  }

  // PLAYING
  resolvePlayer(dt);
  updateEnemies(dt);
  updateCoins(dt);
  updateParticles(dt);
  updateFloats(dt);
  updateDarkness(dt);
  updateCamera();
  checkGoal();
  if(quoteFlash.life>0)quoteFlash.life-=dt;

  drawBgByTheme(ox);
  drawTiles(ox);
  drawFlagPole(ox);
  drawCoins(ox);
  drawParticles(ox);
  drawEnemies(ox);
  drawPlayer(ox);
  drawFloats(ox);
  drawQuoteFlash();
  updateHUD();
}

// ─── Responsive Scaling ──────────────────────────────────
function scaleCanvas(){
  const wrap=document.getElementById('wrap');
  const vw=window.innerWidth,vh=window.innerHeight;
  const isPortrait=vh>vw;
  const maxW=Math.min(vw-6,800);
  const scale=maxW/800;
  wrap.style.transform='scale('+scale+')';
  wrap.style.transformOrigin='top center';
  wrap.style.position='';
  wrap.style.top='';wrap.style.left='';
  wrap.style.marginBottom=((440+44)*(scale-1))+'px';
  wrap.style.marginTop='';
}
window.addEventListener('resize',scaleCanvas);
window.addEventListener('orientationchange',()=>{setTimeout(scaleCanvas,150);});
scaleCanvas();

requestAnimationFrame(loop);
</script>
